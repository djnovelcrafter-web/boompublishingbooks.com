<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1200" viewBox="0 0 800 1200" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#060a12"/>
      <stop offset="0.45" stop-color="#0c1424"/>
      <stop offset="0.78" stop-color="#1a1622"/>
      <stop offset="1" stop-color="#c4633a"/>
    </linearGradient>
    <radialGradient id="topglow" cx="0.5" cy="0.32" r="0.5">
      <stop offset="0" stop-color="#9fd8ee" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#9fd8ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="botglow" cx="0.5" cy="1" r="0.6">
      <stop offset="0" stop-color="#f0a16a" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#f0a16a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="column" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9fd8ee" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#9fd8ee" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#9fd8ee" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="1200" fill="url(#bg)"/>
  <rect width="800" height="1200" fill="url(#topglow)"/>
  <rect width="800" height="1200" fill="url(#botglow)"/>

  <!-- stars -->
  <g fill="#ffffff" opacity="0.7">
    <circle cx="120" cy="120" r="1.6"/><circle cx="240" cy="80" r="1.2"/><circle cx="640" cy="110" r="1.7"/>
    <circle cx="700" cy="200" r="1.2"/><circle cx="90" cy="260" r="1.3"/><circle cx="560" cy="60" r="1.1"/>
    <circle cx="410" cy="95" r="1.2"/><circle cx="330" cy="180" r="1"/><circle cx="690" cy="330" r="1.2"/>
  </g>

  <!-- light column + arena ring -->
  <rect x="360" y="150" width="80" height="560" fill="url(#column)"/>
  <circle cx="400" cy="430" r="150" fill="none" stroke="#9fd8ee" stroke-opacity="0.35" stroke-width="2"/>
  <circle cx="400" cy="430" r="118" fill="none" stroke="#9fd8ee" stroke-opacity="0.22" stroke-width="1.5"/>
  <!-- star emblem (clenched-star sigil) -->
  <path d="M400,370 L414.1,410.6 L457.1,411.5 L422.8,437.4 L435.3,478.5 L400,454 L364.7,478.5 L377.2,437.4 L342.9,411.5 L385.9,410.6 Z"
        fill="#d9b46a" stroke="#f0d79a" stroke-width="1.5"/>

  <!-- title -->
  <text x="400" y="772" text-anchor="middle" fill="#cfe6f2" font-size="34" letter-spacing="20">THE</text>
  <text x="400" y="862" text-anchor="middle" fill="#ffffff" font-size="94" font-weight="900" letter-spacing="3">OPPONENT</text>
  <rect x="320" y="892" width="160" height="2" fill="#c4633a"/>
  <text x="400" y="936" text-anchor="middle" fill="#d9b46a" font-size="19" letter-spacing="5" font-family="Georgia, serif" font-style="italic">Merit is peace. Excellence is obedience.</text>

  <!-- footer -->
  <text x="400" y="1086" text-anchor="middle" fill="#cfe6f2" font-size="20" letter-spacing="9" opacity="0.85">BOOK ONE</text>
  <text x="400" y="1138" text-anchor="middle" fill="#f3e4c4" font-size="34" font-weight="700" letter-spacing="8">VESPER LOCKE</text>
</svg>
