<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="800" height="1200" role="img" aria-label="The Mirage Queen cover">
  <defs>
    <linearGradient id="mqsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2d63"/>
      <stop offset="45%" stop-color="#241a40"/>
      <stop offset="100%" stop-color="#0a0716"/>
    </linearGradient>
    <radialGradient id="mqthrone" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#b9a7e0" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#6e5a9e" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#6e5a9e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mqcrystal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eaf0ff" stop-opacity="0.0"/>
      <stop offset="30%" stop-color="#cdbdf0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#6e5a9e" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="mqorb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eaf0ff" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#b9a7e0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#8a6bd0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mqblue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5aa6e0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#5aa6e0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mqamber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0922a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e0922a" stop-opacity="0"/>
    </radialGradient>
    <filter id="mqsoft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="7"/></filter>
  </defs>

  <!-- sky -->
  <rect width="800" height="1200" fill="url(#mqsky)"/>

  <!-- cold stars -->
  <g fill="#dfe2fb">
    <circle cx="90" cy="120" r="1.6" opacity="0.7"/><circle cx="200" cy="70" r="1.1" opacity="0.5"/>
    <circle cx="300" cy="150" r="1.3" opacity="0.6"/><circle cx="470" cy="110" r="1.6" opacity="0.8"/>
    <circle cx="560" cy="60" r="1.2" opacity="0.55"/><circle cx="650" cy="150" r="1.4" opacity="0.65"/>
    <circle cx="720" cy="100" r="1.1" opacity="0.5"/><circle cx="120" cy="250" r="1.1" opacity="0.5"/>
    <circle cx="690" cy="250" r="1.2" opacity="0.6"/><circle cx="400" cy="48" r="1.2" opacity="0.6"/>
  </g>

  <!-- void cracks across the sky -->
  <g stroke="#0a0716" stroke-width="3" fill="none" opacity="0.8">
    <path d="M0,180 L120,150 L160,200 L280,170"/>
    <path d="M800,140 L690,170 L650,130 L540,165"/>
  </g>
  <g stroke="#8a6bd0" stroke-width="1.1" fill="none" opacity="0.55">
    <path d="M0,180 L120,150 L160,200 L280,170"/>
    <path d="M800,140 L690,170 L650,130 L540,165"/>
  </g>

  <!-- throne glow -->
  <ellipse cx="400" cy="520" rx="300" ry="380" fill="url(#mqthrone)"/>

  <!-- mirrored crystal archway (echoes Book One's covered-bridge frame) -->
  <g fill="url(#mqcrystal)" opacity="0.9">
    <polygon points="150,1000 150,360 210,300 210,1000"/>
    <polygon points="650,1000 650,360 590,300 590,1000"/>
    <polygon points="150,360 210,300 400,250 590,300 650,360 400,330"/>
  </g>
  <g fill="#0a0716">
    <polygon points="210,1000 210,360 400,318 590,360 590,1000"/>
  </g>

  <!-- found-family accent lights pressing in from the lower edges -->
  <circle cx="225" cy="760" r="120" fill="url(#mqblue)"/>
  <circle cx="575" cy="760" r="120" fill="url(#mqamber)"/>

  <!-- throne of black glass -->
  <g fill="#140d28">
    <polygon points="300,900 500,900 520,700 480,560 320,560 280,700"/>
    <polygon points="320,560 480,560 470,470 330,470"/>
  </g>
  <g fill="#2a2140">
    <polygon points="330,470 470,470 460,500 340,500"/>
  </g>

  <!-- the queen: serene silhouette with violet light -->
  <g>
    <ellipse cx="400" cy="470" rx="34" ry="40" fill="#1b1330"/>
    <polygon points="366,510 434,510 452,690 348,690" fill="#1b1330"/>
    <!-- violet light threading beneath the skin -->
    <g stroke="#b9a7e0" stroke-width="1.6" fill="none" opacity="0.8">
      <path d="M400,500 L400,640"/><path d="M384,540 L400,580 L416,540"/>
      <path d="M380,600 L400,620 L420,600"/>
    </g>
    <!-- crystalline crown forming -->
    <g fill="#eaf0ff" opacity="0.95">
      <polygon points="372,432 380,396 388,432"/>
      <polygon points="392,430 400,386 408,430"/>
      <polygon points="412,432 420,396 428,432"/>
    </g>
    <g fill="#cdbdf0" opacity="0.7">
      <polygon points="372,432 380,406 388,432"/>
      <polygon points="412,432 420,406 428,432"/>
    </g>
  </g>

  <!-- the orb beside the throne -->
  <circle cx="400" cy="560" r="120" fill="url(#mqorb)" opacity="0.5"/>

  <!-- reaching hands from the dark (crown her, or pull her free?) -->
  <g stroke="#5aa6e0" stroke-width="3.5" fill="none" opacity="0.7" filter="url(#mqsoft)">
    <path d="M250,860 q40,-40 80,-60"/>
  </g>
  <g stroke="#e0922a" stroke-width="3.5" fill="none" opacity="0.7" filter="url(#mqsoft)">
    <path d="M550,860 q-40,-40 -80,-60"/>
  </g>

  <!-- title block -->
  <g text-anchor="middle" font-family="Georgia, 'Times New Roman', serif">
    <text x="400" y="975" fill="#cdbdf0" font-size="26" letter-spacing="6" opacity="0.9">THE BRIDGE-WALKER</text>
    <text x="400" y="1052" fill="#eef0fc" font-size="72" font-weight="bold" letter-spacing="2" opacity="0.98">THE MIRAGE</text>
    <text x="400" y="1126" fill="#eef0fc" font-size="72" font-weight="bold" letter-spacing="6" opacity="0.98">QUEEN</text>
    <text x="400" y="1175" fill="#b9a7e0" font-size="24" letter-spacing="8">EVELINE CROSS</text>
  </g>
</svg>
