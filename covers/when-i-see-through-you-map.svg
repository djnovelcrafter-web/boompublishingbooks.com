<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 640" width="1120" height="640" font-family="Georgia,'Times New Roman',serif" role="img" aria-label="Journey map: Jack's and Rose's paths across the war, converging at the Karsai, and the relic's road home to India.">
  <defs>
    <linearGradient id="parch" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a150c"/>
      <stop offset="0.5" stop-color="#241d11"/>
      <stop offset="1" stop-color="#15110a"/>
    </linearGradient>
    <radialGradient id="vig" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.45"/>
    </radialGradient>
    <marker id="arrJack" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L7,4.5 L0,9 Z" fill="#8fb4d6"/></marker>
    <marker id="arrRose" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L7,4.5 L0,9 Z" fill="#e2b07c"/></marker>
    <marker id="arrJade" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L7,4.5 L0,9 Z" fill="#48b78a"/></marker>
  </defs>

  <rect width="1120" height="640" fill="url(#parch)"/>

  <!-- graticule (faint lat/long) -->
  <g stroke="#c9a24b" stroke-opacity="0.10" fill="none" stroke-width="1">
    <path d="M0,160 Q560,140 1120,170"/><path d="M0,300 Q560,285 1120,310"/>
    <path d="M0,440 Q560,425 1120,450"/>
    <path d="M180,0 Q200,320 180,640"/><path d="M430,0 Q450,320 430,640"/>
    <path d="M700,0 Q720,320 700,640"/><path d="M950,0 Q970,320 950,640"/>
  </g>

  <!-- faint abstract landmasses -->
  <g fill="#3a3018" fill-opacity="0.22">
    <path d="M40,230 Q120,170 170,250 Q210,330 150,430 Q110,500 70,440 Q30,360 40,230 Z"/>
    <path d="M360,200 Q560,150 760,180 Q960,205 1010,300 Q900,330 720,330 Q520,360 400,330 Q330,290 360,200 Z"/>
    <path d="M930,470 Q1000,440 1040,500 Q1010,580 970,560 Q920,530 930,470 Z"/>
  </g>
  <rect width="1120" height="640" fill="url(#vig)"/>

  <!-- gold border -->
  <rect x="14" y="14" width="1092" height="612" fill="none" stroke="#c9a24b" stroke-opacity="0.35" stroke-width="1.5"/>
  <rect x="20" y="20" width="1080" height="600" fill="none" stroke="#c9a24b" stroke-opacity="0.18" stroke-width="1"/>

  <!-- title -->
  <text x="560" y="52" text-anchor="middle" font-size="30" fill="#f3ece0" letter-spacing="6">THE JOURNEY</text>
  <text x="560" y="78" text-anchor="middle" font-size="16" fill="#ecd08a" font-style="italic">Two roads to one river.</text>

  <!-- compass rose -->
  <g transform="translate(1035 92)" stroke="#c9a24b" fill="#c9a24b">
    <circle r="30" fill="none" stroke-opacity="0.4"/>
    <path d="M0,-30 L6,0 L0,30 L-6,0 Z" fill-opacity="0.55" stroke="none"/>
    <path d="M-30,0 L0,6 L30,0 L0,-6 Z" fill-opacity="0.25" stroke="none"/>
    <text x="0" y="-36" text-anchor="middle" font-size="11" fill="#ecd08a" stroke="none" font-family="Arial,sans-serif">N</text>
  </g>

  <!-- ===== RELIC route (jade, dashed) ===== -->
  <g fill="none" stroke="#3fae84" stroke-width="2.4" stroke-dasharray="3 7" stroke-linecap="round" opacity="0.85">
    <path d="M1015,515 C720,600 320,565 138,398" marker-end="url(#arrJade)"/>
    <path d="M700,300 C852,362 952,448 1012,512" marker-end="url(#arrJade)"/>
  </g>
  <text x="470" y="588" text-anchor="middle" font-size="12" fill="#7fcfae" font-style="italic" opacity="0.9">the relic carried west · 1845</text>
  <text x="905" y="430" text-anchor="middle" font-size="12" fill="#7fcfae" font-style="italic" opacity="0.9">home again · 1947</text>

  <!-- ===== JACK route (cold blue, solid) ===== -->
  <g fill="none" stroke="#6f9bc0" stroke-width="3" stroke-linecap="round">
    <path d="M130,385 C300,470 392,395 510,318" marker-end="url(#arrJack)"/>
    <path d="M520,312 C645,235 772,176 860,152" marker-end="url(#arrJack)"/>
    <path d="M862,156 C836,236 766,256 706,296" marker-end="url(#arrJack)"/>
  </g>

  <!-- ===== ROSE route (rose-gold, solid) ===== -->
  <g fill="none" stroke="#e0a878" stroke-width="3" stroke-linecap="round">
    <path d="M132,392 C322,508 418,432 512,322" marker-end="url(#arrRose)"/>
    <path d="M520,322 C632,418 720,442 802,452" marker-end="url(#arrRose)"/>
    <path d="M804,448 C776,398 732,350 706,304" marker-end="url(#arrRose)"/>
  </g>

  <!-- ===== NODES ===== -->
  <g>
    <!-- Georgia -->
    <circle cx="130" cy="385" r="7" fill="#1a150c" stroke="#ecd08a" stroke-width="2.5"/>
    <text x="130" y="416" text-anchor="middle" font-size="14" fill="#f3ece0">Coweta County, Georgia</text>
    <text x="130" y="433" text-anchor="middle" font-size="11" fill="#a7a08e" font-style="italic">home — the golden summer</text>

    <!-- Italy -->
    <circle cx="515" cy="316" r="7" fill="#1a150c" stroke="#ecd08a" stroke-width="2.5"/>
    <text x="515" y="296" text-anchor="middle" font-size="14" fill="#f3ece0">Italy — the front</text>
    <text x="515" y="280" text-anchor="middle" font-size="11" fill="#a7a08e" font-style="italic">the cliff</text>

    <!-- The Camp -->
    <circle cx="864" cy="150" r="7" fill="#1a150c" stroke="#9bb7cf" stroke-width="2.5"/>
    <text x="864" y="132" text-anchor="middle" font-size="14" fill="#f3ece0">The Camp</text>
    <text x="864" y="116" text-anchor="middle" font-size="11" fill="#a7a08e" font-style="italic">the cold edge of the world</text>

    <!-- Persian Corridor -->
    <circle cx="805" cy="455" r="7" fill="#1a150c" stroke="#ecd08a" stroke-width="2.5"/>
    <text x="805" y="479" text-anchor="middle" font-size="14" fill="#f3ece0">The Persian Corridor</text>
    <text x="805" y="495" text-anchor="middle" font-size="11" fill="#a7a08e" font-style="italic">Basra · Tehran · north</text>

    <!-- India -->
    <circle cx="1015" cy="515" r="7" fill="#1a150c" stroke="#7fcfae" stroke-width="2.5"/>
    <text x="1010" y="539" text-anchor="middle" font-size="14" fill="#f3ece0">Shantivan · India</text>
    <text x="1010" y="555" text-anchor="middle" font-size="11" fill="#a7a08e" font-style="italic">where it began &amp; ends</text>

    <!-- The Karsai — convergence star -->
    <g transform="translate(700 300)">
      <g stroke="#ffe9a8" stroke-width="2">
        <path d="M0,-17 L0,17 M-17,0 L17,0 M-12,-12 L12,12 M-12,12 L12,-12"/>
      </g>
      <circle r="6" fill="#fff3cf" stroke="#c9a24b" stroke-width="1.5"/>
    </g>
    <text x="700" y="338" text-anchor="middle" font-size="15" fill="#ffe9a8" letter-spacing="2">THE KARSAI</text>
    <text x="700" y="355" text-anchor="middle" font-size="11" fill="#d9c79a" font-style="italic">where every road meets</text>
  </g>

  <!-- ===== LEGEND (top-left) ===== -->
  <g transform="translate(42 102)">
    <rect width="372" height="138" rx="10" fill="#100c06" fill-opacity="0.72" stroke="#c9a24b" stroke-opacity="0.25"/>
    <text x="20" y="28" font-size="12" fill="#c9a24b" letter-spacing="3" font-family="Arial,sans-serif">THE ROADS</text>
    <g font-size="13" fill="#ece4d6">
      <line x1="20" y1="50" x2="56" y2="50" stroke="#6f9bc0" stroke-width="3"/>
      <text x="66" y="54">Jack — Georgia · Italy · the camp · the Karsai</text>
      <line x1="20" y1="78" x2="56" y2="78" stroke="#e0a878" stroke-width="3"/>
      <text x="66" y="82">Rose — Georgia · Italy · the Corridor · the Karsai</text>
      <line x1="20" y1="106" x2="56" y2="106" stroke="#3fae84" stroke-width="2.4" stroke-dasharray="3 6"/>
      <text x="66" y="110">The relic — west in 1845, home in 1947</text>
    </g>
  </g>
</svg>
