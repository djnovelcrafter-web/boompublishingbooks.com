<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1200" viewBox="0 0 800 1200" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#0c1019"/>
      <stop offset="0.5" stop-color="#15182a"/>
      <stop offset="1" stop-color="#3a1822"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.36" r="0.55">
      <stop offset="0" stop-color="#ecd08a" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ecd08a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#c9a24b" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#c9a24b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8b2635" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#8b2635" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="1200" fill="url(#bg)"/>
  <rect width="800" height="1200" fill="url(#glow)"/>

  <!-- two overlapping circles: two versions, one "us" -->
  <circle cx="335" cy="430" r="150" fill="url(#cA)" stroke="#c9a24b" stroke-opacity="0.55" stroke-width="2"/>
  <circle cx="465" cy="430" r="150" fill="url(#cB)" stroke="#ecd08a" stroke-opacity="0.7" stroke-width="2"/>
  <text x="400" y="446" text-anchor="middle" fill="#f3e6c6" font-size="30" letter-spacing="10" font-family="Georgia, serif" font-style="italic">us</text>

  <!-- title -->
  <text x="400" y="742" text-anchor="middle" fill="#ffffff" font-size="64" font-weight="800" letter-spacing="2">THIS VERSION</text>
  <text x="400" y="818" text-anchor="middle" fill="#ffffff" font-size="64" font-weight="800" letter-spacing="6">OF US</text>
  <rect x="350" y="852" width="100" height="2" fill="#8b2635"/>
  <text x="400" y="900" text-anchor="middle" fill="#d9b9c0" font-size="20" letter-spacing="4" font-family="Georgia, serif" font-style="italic">the lives we almost lived</text>

  <!-- footer -->
  <text x="400" y="1086" text-anchor="middle" fill="#d9b9c0" font-size="18" letter-spacing="8" opacity="0.85">A NOVEL</text>
  <text x="400" y="1138" text-anchor="middle" fill="#f3e4c4" font-size="34" font-weight="700" letter-spacing="8">MIRA LAVELLE</text>
</svg>
