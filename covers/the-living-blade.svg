<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="800" height="1200" role="img" aria-label="The Living Blade cover">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b2147"/>
      <stop offset="45%" stop-color="#1b1432"/>
      <stop offset="100%" stop-color="#08060f"/>
    </linearGradient>
    <radialGradient id="ember" cx="50%" cy="100%" r="65%">
      <stop offset="0%" stop-color="#e0742a" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#9a3a1e" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#9a3a1e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eaf2ff" stop-opacity="0"/>
      <stop offset="22%" stop-color="#dbe8fb" stop-opacity="0.75"/>
      <stop offset="55%" stop-color="#cfe0f5"/>
      <stop offset="100%" stop-color="#9fb8d8"/>
    </linearGradient>
    <radialGradient id="bladeglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bcd4f4" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#bcd4f4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="brand" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f4dca0" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#d9b46a" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- sky -->
  <rect width="800" height="1200" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#dfe8fb">
    <circle cx="90" cy="120" r="1.6" opacity="0.8"/><circle cx="180" cy="70" r="1.1" opacity="0.6"/>
    <circle cx="260" cy="160" r="1.4" opacity="0.7"/><circle cx="350" cy="90" r="1" opacity="0.5"/>
    <circle cx="470" cy="130" r="1.7" opacity="0.85"/><circle cx="560" cy="60" r="1.2" opacity="0.6"/>
    <circle cx="640" cy="150" r="1.5" opacity="0.75"/><circle cx="710" cy="100" r="1.1" opacity="0.6"/>
    <circle cx="120" cy="240" r="1.2" opacity="0.6"/><circle cx="690" cy="240" r="1.3" opacity="0.7"/>
    <circle cx="40" cy="330" r="1.1" opacity="0.5"/><circle cx="760" cy="330" r="1.2" opacity="0.6"/>
    <circle cx="220" cy="300" r="1" opacity="0.45"/><circle cx="600" cy="300" r="1" opacity="0.45"/>
    <circle cx="400" cy="50" r="1.3" opacity="0.7"/><circle cx="320" cy="220" r="0.9" opacity="0.4"/>
    <circle cx="500" cy="220" r="0.9" opacity="0.4"/><circle cx="150" cy="400" r="1" opacity="0.4"/>
    <circle cx="660" cy="410" r="1" opacity="0.4"/>
  </g>

  <!-- blade glow halo -->
  <ellipse cx="400" cy="560" rx="120" ry="360" fill="url(#bladeglow)"/>

  <!-- fraying smoke at the tip -->
  <g fill="#aab6cc" filter="url(#soft)">
    <circle cx="398" cy="250" r="10" opacity="0.25"/>
    <circle cx="408" cy="225" r="8" opacity="0.18"/>
    <circle cx="390" cy="205" r="7" opacity="0.13"/>
    <circle cx="402" cy="185" r="6" opacity="0.08"/>
  </g>

  <!-- the blade of light -->
  <polygon points="400,270 412,560 400,840 388,560" fill="url(#blade)" filter="url(#soft)" opacity="0.9"/>
  <polygon points="400,272 407,560 400,838 393,560" fill="#f2f8ff" opacity="0.9"/>

  <!-- crossguard -->
  <rect x="346" y="842" width="108" height="12" rx="6" fill="#cdd9ec"/>
  <rect x="346" y="842" width="108" height="12" rx="6" fill="#9fb8d8" opacity="0.5"/>
  <!-- hilt -->
  <rect x="392" y="854" width="16" height="64" rx="6" fill="#b9c6dc"/>
  <circle cx="400" cy="926" r="9" fill="#cdd9ec"/>

  <!-- wielder's spiral brand -->
  <circle cx="400" cy="892" r="46" fill="url(#brand)"/>
  <path d="M400,892 m0,-22 a22,22 0 1,1 -15.5,6.4 a14,14 0 1,1 9.9,-4.1 a7,7 0 1,1 -4.6,2.4"
        fill="none" stroke="#f6e2ad" stroke-width="2.4" opacity="0.9"/>

  <!-- ember glow + besieged city -->
  <rect x="0" y="900" width="800" height="300" fill="url(#ember)"/>
  <g fill="#07060c">
    <!-- skyline -->
    <rect x="0" y="1070" width="800" height="130"/>
    <rect x="40" y="1030" width="60" height="170"/>
    <rect x="120" y="1052" width="40" height="148"/>
    <rect x="175" y="1015" width="34" height="185"/>
    <rect x="610" y="1040" width="48" height="160"/>
    <rect x="675" y="1018" width="38" height="182"/>
    <rect x="730" y="1055" width="40" height="145"/>
    <!-- central black ziggurat -->
    <polygon points="330,1070 470,1070 452,1030 348,1030"/>
    <polygon points="348,1030 452,1030 436,995 364,995"/>
    <polygon points="364,995 436,995 420,962 380,962"/>
    <rect x="392" y="935" width="16" height="30"/>
  </g>
  <!-- a few embers rising -->
  <g fill="#f4a55a">
    <circle cx="300" cy="1040" r="2" opacity="0.8"/><circle cx="520" cy="1010" r="1.6" opacity="0.7"/>
    <circle cx="250" cy="1000" r="1.4" opacity="0.6"/><circle cx="560" cy="1055" r="1.8" opacity="0.7"/>
    <circle cx="470" cy="1030" r="1.4" opacity="0.6"/>
  </g>

  <!-- title -->
  <g text-anchor="middle" font-family="Georgia, 'Times New Roman', serif">
    <text x="400" y="700" fill="#eef3fc" font-size="74" font-weight="bold" letter-spacing="2" opacity="0.97">THE LIVING</text>
    <text x="400" y="780" fill="#eef3fc" font-size="74" font-weight="bold" letter-spacing="6" opacity="0.97">BLADE</text>
    <text x="400" y="1158" fill="#d9b46a" font-size="26" letter-spacing="8">EVELINE CROSS</text>
  </g>
</svg>
